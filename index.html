<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Intel Pipeline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid #2a2a4a;
        }
        
        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #888;
            font-size: 14px;
        }
        
        .badge {
            display: inline-block;
            background: #10b981;
            color: #000;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 15px;
        }
        
        .main { padding: 30px; max-width: 900px; margin: 0 auto; }
        
        .section-title {
            font-size: 18px;
            color: #f093fb;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .video-card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #2a2a4a;
        }
        
        .video-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        
        .video-rank {
            font-size: 36px;
            font-weight: bold;
            color: #f093fb;
        }
        
        .video-meta {
            text-align: right;
        }
        
        .video-score {
            font-size: 24px;
            font-weight: bold;
            color: #4ade80;
        }
        
        .video-category {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            background: #2a2a4a;
            color: #888;
            display: inline-block;
            margin-top: 5px;
        }
        
        .category-bitcoin { background: #f7931a; color: #000; }
        .category-solana { background: #9945FF; color: #fff; }
        .category-defi { background: #3b82f6; color: #fff; }
        .category-alpha { background: #8b5cf6; color: #fff; }
        .category-other { background: #6b7280; color: #fff; }
        
        .hook-box {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 18px;
            font-weight: 500;
        }
        
        .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
            margin-bottom: 8px;
        }
        
        .context-box {
            background: #0a0a0f;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            color: #ccc;
            font-size: 14px;
        }
        
        .tweet-text {
            background: #0a0a0f;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
            color: #888;
        }
        
        .actions {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            text-align: center;
            font-size: 14px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
        }
        
        .btn-secondary {
            background: #2a2a4a;
            color: #fff;
        }
        
        .footer {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 12px;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 20px;
            background: #1a1a2e;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #f093fb;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎬 CRYPTO CONTENT CREATOR</h1>
        <p>AI-powered content pipeline for crypto news</p>
        <span class="badge">● LIVE DATA - LAST 48 HOURS</span>
    </div>
    
    <div class="main">
        <div class="stats">
            <div class="stat">
                <div class="stat-value">169</div>
                <div class="stat-label">Tweets Scraped</div>
            </div>
            <div class="stat">
                <div class="stat-value">48</div>
                <div class="stat-label">Accounts</div>
            </div>
            <div class="stat">
                <div class="stat-value">10</div>
                <div class="stat-label">Videos Ready</div>
            </div>
        </div>
        
        <div class="section-title">🎬 READY TO RECORD</div>
        
        <div id="content"></div>
    </div>
    
    <div class="footer">
        Crypto Intel Pipeline • Built with Xquik + AI
    </div>
    
    <script>
        const tweets = [
            {
                "rank": 1,
                "score": 9.0,
                "category": "bitcoin",
                "hook": "₿ Bitcoin is making headlines again...",
                "context": "@coingecko reporting: $255M involved in latest purchase",
                "text": "JUST IN: Strategy purchases another 3,273 Bitcoin for ~$255M, bringing its total holdings to 818,334 $BTC. Are you bullish on Bitcoin?",
                "username": "coingecko",
                "url": "https://x.com/coingecko/status/2048737784253280453"
            },
            {
                "rank": 2,
                "score": 8.5,
                "category": "bitcoin",
                "hook": "₿ Bitcoin is making headlines again...",
                "context": "@BitcoinMagazine with breaking news",
                "text": "JUST IN: 🇺🇸 SEC Chair Paul Atkins urges congress to advance the Bitcoin & crypto market structure legislation \"We really need to have congress speak to this area. We're ready, willing, and able\"",
                "username": "BitcoinMagazine",
                "url": "https://x.com/BitcoinMagazine/status/2048852695445111152"
            },
            {
                "rank": 3,
                "score": 8.5,
                "category": "alpha",
                "hook": "🎯 Alpha drop - pay attention to this...",
                "context": "@Tradermayne with trading insight",
                "text": "Interesting to see how many people are dunking on this guy. Just a month or two ago everyone was praising him like a god for calling the top. They want the coin to go up, he's bearish so they get mad, typical.",
                "username": "Tradermayne",
                "url": "https://x.com/Tradermayne/status/2048556192054833259"
            },
            {
                "rank": 4,
                "score": 8.0,
                "category": "bitcoin",
                "hook": "₿ Bitcoin is making headlines again...",
                "context": "@BitcoinMagazine announces something big",
                "text": "JUST IN: Bitcoin Magazine announces the launch of 'BM TV', an institutional grade live show dedicated to covering Bitcoin, macroeconomics, geopolitics, and more! 🚀",
                "username": "BitcoinMagazine",
                "url": "https://x.com/BitcoinMagazine/status/2048821202446319828"
            },
            {
                "rank": 5,
                "score": 8.0,
                "category": "solana",
                "hook": "◎ Something big is happening on Solana...",
                "context": "@SolanaFloor reporting: $8M raise",
                "text": "News: @Solana_Company Signals Return to $SOL Accumulation With $8M Raise",
                "username": "SolanaFloor",
                "url": "https://x.com/SolanaFloor/status/2048872359847968965"
            },
            {
                "rank": 6,
                "score": 8.0,
                "category": "defi",
                "hook": "💎 DeFi update you need to know about...",
                "context": "@coingecko reporting something important",
                "text": "Top 10 DeFi United Contributors: 1. @Arbitrum – 30765 ETH 2. @Mantle_Official – 30000 ETH 3. @Aave – 25000 ETH ... Will you be contributing to the relief fund?",
                "username": "coingecko",
                "url": "https://x.com/coingecko/status/2048715147641032842"
            },
            {
                "rank": 7,
                "score": 8.0,
                "category": "bitcoin",
                "hook": "₿ Bitcoin is making headlines again...",
                "context": "@rektcapital with technical analysis",
                "text": "#BTC Bitcoin has Weekly Closed just above the 21-week EMA (green). Which means price is technically positioned for a retest of the EMA. The problem is that there is very little space for the retest to breathe.",
                "username": "rektcapital",
                "url": "https://x.com/rektcapital/status/2048836623488741440"
            },
            {
                "rank": 8,
                "score": 8.0,
                "category": "bitcoin",
                "hook": "₿ Bitcoin is making headlines again...",
                "context": "@rektcapital with breaking news",
                "text": "Just in case you missed it... I published an Altcoin Newsletter this past Friday. The following Altcoins were covered: $VET $TIA $PYTH $ONDO $PEPE $ZEC",
                "username": "rektcapital",
                "url": "https://x.com/rektcapital/status/2048773466459910583"
            },
            {
                "rank": 9,
                "score": 7.5,
                "category": "other",
                "hook": "📊 This crypto story is flying under the radar...",
                "context": "@BitcoinMagazine with breaking news",
                "text": "JUST IN: 🇺🇸 US Senator Cynthia Lummis announces Bitcoin and crypto market structure legislation will get marked up \"in May.\" \"We are gonna get it to the finish line.\" 🚀",
                "username": "BitcoinMagazine",
                "url": "https://x.com/BitcoinMagazine/status/2048835376849301656"
            },
            {
                "rank": 10,
                "score": 7.5,
                "category": "solana",
                "hook": "◎ Something big is happening on Solana...",
                "context": "@SolanaFloor with breaking news",
                "text": "News: $BNSOL Claims Solana's LST Crown Amidst DeFi Deposit Flight",
                "username": "SolanaFloor",
                "url": "https://x.com/SolanaFloor/status/2048844380421890378"
            }
        ];
        
        const contentDiv = document.getElementById('content');
        
        tweets.forEach(tweet => {
            const catClass = 'category-' + tweet.category;
            
            contentDiv.innerHTML += `
                <div class="video-card">
                    <div class="video-header">
                        <div class="video-rank">#${tweet.rank}</div>
                        <div class="video-meta">
                            <div class="video-score">${tweet.score}/10</div>
                            <span class="video-category ${catClass}">${tweet.category.toUpperCase()}</span>
                        </div>
                    </div>
                    
                    <div class="hook-box">
                        <div class="label">🎤 HOOK (Say This First)</div>
                        ${tweet.hook}
                    </div>
                    
                    <div class="context-box">
                        <div class="label">📝 WHAT TO SAY</div>
                        ${tweet.context}
                    </div>
                    
                    <div class="tweet-text">
                        "${tweet.text}"
                    </div>
                    
                    <div class="actions">
                        <a href="${tweet.url}" target="_blank" class="btn btn-primary">
                            👁️ View Original Tweet
                        </a>
                        <span class="btn btn-secondary" style="cursor:default;">
                            📋 Copy Script
                        </span>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
