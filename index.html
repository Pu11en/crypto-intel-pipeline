"RT @BitcoinMagazine: JUST IN: Billionaire Tim Draper says it's now irresponsible for companies to not hold bitcoin.\n\n\"Because when Silicon…", "created_at": "Tue Apr 28 00:22:52 +0000 2026", "score": 6.0, "category": "bitcoin", "hook": "bitcoin signal", "url": "https://x.com/BitcoinMagazine/status/2048920851450609666"}];
        
        let currentFilter = 'all';
        
        function renderTweets(filter = 'all') {
            const container = document.getElementById('tweets');
            const filtered = filter === 'all' ? ALL_TWEETS : ALL_TWEETS.filter(t => t.category === filter);
            
            document.getElementById('total-tweets').textContent = filtered.length;
            
            container.innerHTML = filtered.map((tweet, i) => {
                const catClass = 'category-' + tweet.category;
                const text = tweet.text.replace(/\n/g, '<br>').substring(0, 200);
                
                return `
                    <div class="tweet-card">
                        <div class="tweet-rank">#${i + 1}</div>
                        <div class="tweet-content">
                            <div class="tweet-header">
                                <span class="tweet-user">@${tweet.username}</span>
                                <div class="tweet-meta">
                                    <span class="tweet-score">${tweet.score}/10</span>
                                    <span class="tweet-category ${catClass}">${tweet.category}</span>
                                </div>
                            </div>
                            <div class="tweet-text">${text}${tweet.text.length > 200 ? '...' : ''}</div>
                            <div class="tweet-time">${tweet.created_at}</div>
                            <div class="tweet-actions">
                                <a href="${tweet.url}" target="_blank" class="btn btn-primary">View Tweet</a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                renderTweets(currentFilter);
            });
        });
        
        // Initial render
        renderTweets();
    </script>
